<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Work Worth App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f4f4f4;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    button {
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>💸 Combien ça te coûte jour de taf ?</h2>

<input type="number" id="salaire" placeholder="Salaire mensuel (€)">
<br>
<input type="number" id="heures" placeholder="Heures / mois">
<br>
<input type="number" id="heuresJour" placeholder="Heures / jour (ex: 7)">
<br>
<input type="number" id="prix" placeholder="Prix (€)">
<br>

<button onclick="calculer()">Calculer</button>

<h3 id="resultat"></h3>

<script>
function calculer() {
  let salaire = document.getElementById("salaire").value;
  let heures = document.getElementById("heures").value;
  let heuresJour = document.getElementById("heuresJour").value;
  let prix = document.getElementById("prix").value;

  let taux = salaire / heures;
  let heuresNecessaires = prix / taux;
  let jours = heuresNecessaires / heuresJour;

  document.getElementById("resultat").innerText =
    "⏳ " + jours.toFixed(2) + " jours de travail";
}
</script>

</body>
</html>
